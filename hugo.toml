# themes/banyan/hugo.toml
# -------------------------------------------------------------------
# Theme Default Configuration
# -------------------------------------------------------------------
# This file provides the baseline properties for the Banyan theme.
# Note: Structural configurations like [outputs], [outputFormats], 
# [taxonomies], and [permalinks] are INTENTIONALLY OMITTED here 
# because Hugo does not inherit them from theme configurations. 
# Users MUST define those in their root hugo.toml.

baseURL = "http://localhost:1313/"
languageCode = "en-us"
title = "Banyan Theme"


preserveTaxonomyNames = true
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = true
enableRobotsTXT = true
timeZone = "Asia/Shanghai"

enableGitInfo = true
panicOnWarning = true

[languages]
[languages.en]
languageName = "English"
weight = 1
[languages.en.params]
locale = "en_US"

[languages.zh]
languageName = "中文"
weight = 2
[languages.zh.params]
locale = "zh_CN"

[languages.zh-tw]
languageName = "繁體"
weight = 3
[languages.zh-tw.params]
locale = "zh_TW"

[params.web_app_manifest]
# link  = emit <link rel="manifest"> in <head> for the most predictable PWA path
# defer = emit the manifest late in <head>, after render-critical styles/scripts
#         have already been discovered
# off   = do not generate or link the web app manifest
mode = "defer"

[frontmatter]
lastmod = ["lastmod", ":git", ":fileModTime", ":default"]
