# themes/banyan/hugo.toml
# -------------------------------------------------------------------
# Theme Default Configuration
# -------------------------------------------------------------------
# This file provides the baseline properties for the Banyan theme.
# Note: Structural configurations like [outputs], [taxonomies], and
# [permalinks] are intentionally omitted here. Sites must define them in their
# root hugo.toml. Output format definitions are inherited from theme config, but
# sites still need root [outputs] entries to enable those formats.

baseURL = "http://localhost:1313/"
languageCode = "en-us"
title = "Banyan Theme"


preserveTaxonomyNames = true
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = true
enableRobotsTXT = true
timeZone = "Asia/Shanghai"

enableGitInfo = true
panicOnWarning = true

[languages]
[languages.en]
languageName = "English"
weight = 1
[languages.en.params]
locale = "en_US"

[languages.zh]
languageName = "中文"
weight = 2
[languages.zh.params]
locale = "zh_CN"

[languages.zh-tw]
languageName = "繁體"
weight = 3
[languages.zh-tw.params]
locale = "zh_TW"

[outputFormats]
[outputFormats.LLMS]
mediaType = "text/plain"
baseName = "llms"
isPlainText = true
notAlternative = true

# When a page opts into a Markdown mirror, keep HTML first in front matter:
# outputs = ["HTML","AGENT_MARKDOWN"] or ["HTML","MARKDOWN"].
# Hugo uses output order for the primary output; Markdown first can break
# taxonomy/list entry links by making index.md the page's primary URL.
[outputFormats.MARKDOWN]
mediaType = "text/markdown"
baseName = "index"
weight = 20
isPlainText = true
notAlternative = true

[outputFormats.AGENT_MARKDOWN]
mediaType = "text/markdown"
baseName = "index"
weight = 21
isPlainText = true
notAlternative = true

[params.agent_access]
default_policy = "allow"
allow_user_agents = [
  "OAI-SearchBot",
  "ChatGPT-User",
  "Claude-SearchBot",
  "Claude-User",
  "PerplexityBot"
]
disallow_user_agents = [
  "GPTBot",
  "ClaudeBot",
  "Google-Extended"
]

[params.web_app_manifest]
# link  = emit <link rel="manifest"> in <head> for the most predictable PWA path
# defer = emit the manifest late in <head>, after render-critical styles/scripts
#         have already been discovered
# off   = do not generate or link the web app manifest
mode = "defer"

[params.prefetch_runtime]
mode = "off"
# Runtime warmup stack:
# - Handles link rel=prefetch and Service Worker navigation warmup.
# - The environment key uses two capability flags:
#   first flag = link prefetch transport is available
#   second flag = Service Worker API is available in the current browser context
# - Mode short codes keep the runtime dispatch compact:
#   link_sf / link_mf / link_xf
#   sw_sf   / sw_mf   / sw_xf
# - The optional _g suffix enables a sessionStorage gate so identical warmup
#   batches run only once per browser session.

[params.prefetch_runtime.env.TT]
menu = "sw_xf_g"
nav = "sw_xf_g"
crumb = "sw_mf_g"
sort_siblings = "sw_xf_g"
descendants = "sw_xf_g"
post = "sw_mf_g"

[params.prefetch_runtime.env.FT]
ref = "TT"

[params.prefetch_runtime.env.TF]
menu = "link_mf"
nav = "link_xf"
crumb = "link_mf"
sort_siblings = "link_xf"
descendants = "link_mf"
post = "link_mf"

[params.speculation_rules]
# Header stack for external Speculation Rules JSON.
# Edge platforms that cannot emit quoted Speculation-Rules header values should
# keep this off and let the runtime/SW prefetch stack handle warmup.
mode = "off"
runtime_coordination = "preempt_runtime_when_supported"
menu = "prefetch_moderate"
nav = "prefetch_eager"
crumb = "prefetch_moderate"
sort_siblings = "prefetch_eager"
descendants = "prefetch_moderate"
post = "prefetch_moderate"

[params.build]
# Site-wide build version defaults used by SW, fragments, and runtime manifests.
version_prefix = "v"
timestamp_layout = "20060102150405"

[params.build.audit]
permalink_collision = "warn"

[params.service_worker]
# Service Worker is opt-in because it changes browser caching behavior.
mode = "off"
update_check_interval = 15
update_visibility_throttle = 3
offline_notice_path = "offline/"

[params.runtime_i18n]
fallbacks = { "zh-hk" = "zh-tw", "zh-mo" = "zh-tw" }

[frontmatter]
lastmod = ["lastmod", ":git", ":fileModTime", ":default"]
