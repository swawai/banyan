# Theme default cache policy.
# Site owners can override it by creating data/cache-policy.toml at the repo root.

[edgeone]
installCommand = "git submodule sync --recursive && git submodule update --init --recursive --force && npm ci"
buildCommand = "npm run build"
outputDirectory = "public"
nodeVersion = "22.11.0"

[[routes]]
scope = "asset"
path = "/css/*"

[routes.headers]
Cache-Control = "public, max-age=31536000, immutable"

[routes.sw]
mode = "cache-first"
bucket = "fingerprinted"

[[routes]]
scope = "asset"
path = "/js/*"

[routes.headers]
Cache-Control = "public, max-age=31536000, immutable"

[routes.sw]
mode = "cache-first"
bucket = "fingerprinted"

[[routes]]
scope = "asset"
path = "/icon/*"

[routes.headers]
Cache-Control = "public, max-age=31536000, immutable"

[routes.sw]
mode = "cache-first"
bucket = "fingerprinted"

[[routes]]
scope = "asset"
path = "/site/pwa/*.webmanifest"

[routes.headers]
Content-Type = "application/manifest+json; charset=utf-8"
Cache-Control = "public, max-age=31536000, immutable"

[[routes]]
scope = "asset"
path = "/site/*"

[routes.headers]
Cache-Control = "public, max-age=31536000, immutable"

[routes.sw]
mode = "cache-first"
bucket = "fingerprinted"

[[routes]]
scope = "asset"
path = "/runtime/*"

[routes.headers]
Cache-Control = "public, max-age=31536000, immutable"

[routes.sw]
mode = "cache-first"
bucket = "fingerprinted"

[[routes]]
scope = "asset"
path = "/media/content/*"

[routes.headers]
Cache-Control = "public, max-age=31536000, immutable"

[routes.sw]
mode = "cache-first"
bucket = "fingerprinted"

[[routes]]
scope = "asset"
path = "/__fragments/*"

[routes.headers]
Cache-Control = "public, max-age=31536000, immutable"

[routes.sw]
mode = "cache-first"
bucket = "versioned"

[[routes]]
scope = "asset"
path = "/favicon.ico"

[routes.headers]
Cache-Control = "public, max-age=86400, must-revalidate"

[routes.sw]
mode = "ignore"

[[routes]]
scope = "asset"
path = "/favicon.svg"

[routes.headers]
Cache-Control = "public, max-age=86400, must-revalidate"

[routes.sw]
mode = "ignore"

[[routes]]
scope = "asset"
path = "/sw.js"

[routes.headers]
Cache-Control = "no-cache, max-age=0, must-revalidate"

[routes.sw]
mode = "ignore"

[[routes]]
scope = "asset"
path = "/*.xml"

[routes.headers]
# Chrome's built-in XML viewer needs inline styles to render RSS/XML as a tree.
Content-Security-Policy = "default-src 'none'; style-src 'unsafe-inline'; img-src data:; object-src 'none'; base-uri 'none'; frame-ancestors 'self'"

[[routes]]
scope = "agent-markdown"
path = "/*.md"

[routes.headers]
# Markdown mirrors are agent-facing alternates. Keep them fetchable, but keep
# search result landing pages on the canonical HTML documents.
Content-Type = "text/markdown; charset=utf-8"
X-Robots-Tag = "noindex"

[[routes]]
scope = "navigation"
path = "/*"

[routes.sw]
mode = "cache-first"
bucket = "versioned"

[[routes]]
scope = "default"
path = "/*"

[routes.headers]
# Content-Security-Policy is intentionally not declared in this static policy.
# It is generated post-build by themes/banyan/scripts/build/patch-csp.mjs because it
# depends on the exact executable inline script bytes after Hugo minification.
Referrer-Policy = "strict-origin-when-cross-origin"
X-Content-Type-Options = "nosniff"
X-Frame-Options = "SAMEORIGIN"
Permissions-Policy = "accelerometer=(), bluetooth=(), browsing-topics=(), camera=(), display-capture=(), geolocation=(), gyroscope=(), hid=(), magnetometer=(), microphone=(), midi=(), payment=(), serial=(), usb=()"
Strict-Transport-Security = "max-age=300"
Cache-Control = "public, max-age=900, must-revalidate"

[routes.sw]
mode = "ignore"
